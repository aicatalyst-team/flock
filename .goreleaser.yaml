version: 2
project_name: flock

before:
  hooks:
    - go mod tidy

builds:
  - id: flock
    main: ./cmd/flock
    binary: flock
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    name_template: 'flock-{{ .Os }}-{{ .Arch }}'
    files:
      - LICENSE
      - README.md
      - ARCHITECTURE.md
      - SECURITY.md
      - catalog/*

# .deb + .rpm packages for edge / NAS deployments. Raspberry Pi OS,
# Debian, Ubuntu, and most Linux-based NAS (QNAP, Asustor) accept .deb;
# Fedora / CentOS / RHEL accept .rpm. Synology .spk packaging requires
# a different toolchain (Synology's `pkgcreate` against a DSM SDK) and
# lands as a v0.7 follow-up.
#
# Install path: /usr/bin/flock (so it's on PATH out of the box).
# Catalog ships under /usr/share/flock/catalog/ — the binary's
# resolveCatalogDir() already picks it up via the
# /usr/local/share/flock/catalog fallback path, which most distros
# also probe; we go one step further by placing it where APT controls.
nfpms:
  - id: linux-pkgs
    package_name: flock
    file_name_template: 'flock_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    vendor: Hadi Honarvar Nazari
    homepage: https://github.com/hadihonarvar/flock
    maintainer: Hadi Honarvar Nazari <hadi.work.ca@gmail.com>
    description: |
      Self-hosted control plane for LLMs — one URL + one key for your
      team's models. Single Go binary; supports Ollama, vLLM, MLX-LM
      and llama.cpp drivers; multi-machine routing + sharding via
      llama.cpp RPC.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: catalog/
        dst: /usr/share/flock/catalog
      - src: LICENSE
        dst: /usr/share/doc/flock/LICENSE
      - src: README.md
        dst: /usr/share/doc/flock/README.md
      - src: QUICKSTART.md
        dst: /usr/share/doc/flock/QUICKSTART.md
      - src: scripts/two-node-smoke.sh
        dst: /usr/share/flock/scripts/two-node-smoke.sh
        file_info:
          mode: 0755
    overrides:
      deb:
        recommends:
          - llama.cpp     # sharded models need rpc-server + llama-server
      rpm:
        recommends:
          - llama-cpp

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: hadihonarvar
    name: flock
  draft: false
  prerelease: auto
  header: |
    ## Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/hadihonarvar/flock/main/installer/install.sh | sh
    ```

    More options (specific version, custom install dir, join an existing cluster) — see [QUICKSTART.md](https://github.com/hadihonarvar/flock/blob/main/QUICKSTART.md).

    ## Upgrading

    Already running an earlier version? Just run:

    ```bash
    flock update
    ```

    ## Links

    - Website: [flockllm.com](https://flockllm.com)
    - Maintainer: [Hadi Honarvar Nazari](https://www.linkedin.com/in/hadi-honarvar-nazari/) — `hadi.work.ca@gmail.com`

# Homebrew tap publishing is disabled until the hadihonarvar/homebrew-tap
# repo exists. To re-enable:
#   1. Create the repo: gh repo create hadihonarvar/homebrew-tap --public
#   2. Generate a fine-grained PAT with contents:write on that repo
#   3. Add it as GitHub secret HOMEBREW_TAP_GITHUB_TOKEN
#   4. Uncomment the brews block below
