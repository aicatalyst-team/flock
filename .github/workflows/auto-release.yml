name: Auto-release (conventional commits)

# Runs on every push to main. Decides whether to cut a new release based on
# the Conventional Commits prefix of the commits since the last tag:
#
#   feat:  / feat(scope):              → minor bump (e.g. v0.2.x → v0.3.0)
#   fix:   / fix(scope):               → patch bump (e.g. v0.2.0 → v0.2.1)
#   feat!: / BREAKING CHANGE in body   → major bump (e.g. v0.x.y → v1.0.0)
#   any other prefix (docs:, chore:,   → no release
#       refactor:, test:, ci:, …)
#
# Skip a specific push from cutting a release by adding the literal token
# "noautotag" (in square brackets) to the commit message subject. The token
# is kept obscure so it won't accidentally appear in normal commit prose.
#
# Manual tags pushed via `git tag v… && git push origin v…` still trigger
# the existing release.yml — this workflow only handles the auto path.

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  bump:
    # Opt-out token must be the literal string in brackets — see header.
    if: "!contains(github.event.head_commit.message, '[noautotag]')"
    runs-on: ubuntu-24.04
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      release_type: ${{ steps.tag.outputs.release_type }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump from Conventional Commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # If no commit since the last tag has a feat:/fix:/BREAKING prefix,
          # do not bump. (Prevents docs-only / chore-only pushes from cutting
          # a release.)
          default_bump: false
          fetch_all_tags: true
          tag_prefix: v
          release_branches: main

  release:
    needs: bump
    if: needs.bump.outputs.new_tag != ''
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Check out the freshly-created tag, not main. Otherwise
          # GoReleaser sees an untagged commit and refuses to release.
          ref: ${{ needs.bump.outputs.new_tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only used if hadihonarvar/homebrew-tap exists (it doesn't yet,
          # and the goreleaser config already skips brew publishing).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
