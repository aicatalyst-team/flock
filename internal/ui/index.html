<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .tab.active { background-color: rgb(30 41 59); color: white; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 0.875rem; }
    th { background: #f9fafb; font-weight: 600; }
    .pill { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .pill-ok { background: #dcfce7; color: #166534; }
    .pill-warn { background: #fef3c7; color: #92400e; }
    .pill-err { background: #fee2e2; color: #991b1b; }
    .pill-info { background: #dbeafe; color: #1e40af; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85em; background: #f3f4f6; padding: 0.1em 0.3em; border-radius: 0.25em; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app" class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-xl font-bold tracking-tight">Flock</div>
          <div class="text-xs text-slate-400">orchestrate open LLMs · your hardware</div>
        </div>
        <div id="keyStatus" class="text-xs"></div>
      </div>
      <nav class="max-w-6xl mx-auto px-6 flex gap-1 text-sm">
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="dashboard">Dashboard</button>
        <button class="tab px-4 py-2 text-emerald-300 hover:text-white" data-view="connect">Connect</button>
        <button class="tab px-4 py-2 text-emerald-300 hover:text-white" data-view="playground">Playground</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="nodes">Nodes</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="models">Models</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="shards">Shards</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="tokens">Tokens</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="usage">Usage</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="audit">Audit</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="settings">Settings</button>
      </nav>
    </header>

    <!-- Login -->
    <div id="login" class="hidden flex-1 flex items-center justify-center p-6">
      <div class="max-w-md w-full bg-white rounded-lg border border-slate-200 p-6 shadow-sm">
        <h2 class="text-lg font-semibold mb-2">Sign in</h2>
        <p class="text-sm text-slate-600 mb-4">Paste your admin API key. You can find it in your terminal where <span class="code">flock up</span> was started.</p>
        <input id="loginKey" type="password" placeholder="sk-orc-..." class="w-full border border-slate-300 rounded px-3 py-2 text-sm font-mono" />
        <button id="loginBtn" class="mt-3 w-full bg-slate-900 text-white py-2 rounded text-sm font-medium hover:bg-slate-800">Continue</button>
        <p id="loginErr" class="hidden mt-2 text-sm text-red-600"></p>
      </div>
    </div>

    <!-- Content -->
    <main id="content" class="hidden flex-1 max-w-6xl mx-auto w-full px-6 py-6">
      <div id="view-dashboard" class="view space-y-6"></div>
      <div id="view-connect" class="view hidden"></div>
      <div id="view-playground" class="view hidden"></div>
      <div id="view-nodes" class="view hidden"></div>
      <div id="view-models" class="view hidden"></div>
      <div id="view-shards" class="view hidden"></div>
      <div id="view-tokens" class="view hidden"></div>
      <div id="view-usage" class="view hidden"></div>
      <div id="view-audit" class="view hidden"></div>
      <div id="view-settings" class="view hidden"></div>
    </main>

    <footer class="text-center text-xs text-slate-500 py-4">
      Flock · Apache-2.0 · <a href="https://github.com/hadihonarvar/flock" class="underline">github.com/hadihonarvar/flock</a>
    </footer>
  </div>

<script>
const KEY_STORAGE = "flock.apiKey";
let API_KEY = localStorage.getItem(KEY_STORAGE) || "";
let currentView = "dashboard";

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${r.status}: ${t}`);
  }
  if (r.headers.get("content-type")?.includes("application/json")) return r.json();
  return r.text();
}

function showLogin(err) {
  $("#login").classList.remove("hidden");
  $("#content").classList.add("hidden");
  if (err) {
    $("#loginErr").textContent = err;
    $("#loginErr").classList.remove("hidden");
  }
}
function showApp() {
  $("#login").classList.add("hidden");
  $("#content").classList.remove("hidden");
  renderKeyStatus();
  switchView(currentView);
}
function renderKeyStatus() {
  const masked = API_KEY ? API_KEY.slice(0, 9) + "…" : "no key";
  $("#keyStatus").innerHTML = `<span class="text-slate-400">key:</span> <span class="font-mono">${masked}</span> <button id="signout" class="ml-2 text-slate-400 hover:text-white underline">sign out</button>`;
  $("#signout").onclick = () => {
    localStorage.removeItem(KEY_STORAGE);
    API_KEY = "";
    showLogin();
  };
}

$("#loginBtn").onclick = async () => {
  API_KEY = $("#loginKey").value.trim();
  try {
    await api("/admin/v1/nodes");
    localStorage.setItem(KEY_STORAGE, API_KEY);
    showApp();
  } catch (e) {
    showLogin(e.message);
  }
};

function switchView(v) {
  currentView = v;
  $$(".tab").forEach((t) => t.classList.toggle("active", t.dataset.view === v));
  $$(".view").forEach((d) => d.classList.add("hidden"));
  $("#view-" + v).classList.remove("hidden");
  ({
    dashboard: renderDashboard,
    connect: renderConnect,
    playground: renderPlayground,
    nodes: renderNodes,
    models: renderModels,
    shards: renderShards,
    tokens: renderTokens,
    usage: renderUsage,
    audit: renderAudit,
    settings: renderSettings,
  })[v]();
}
$$(".tab").forEach((t) => (t.onclick = () => switchView(t.dataset.view)));

function table(headers, rows) {
  return `<div class="bg-white border border-slate-200 rounded overflow-hidden">
    <table>
      <thead><tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows.length ? rows.map((r) => `<tr>${r.map((c) => `<td>${c ?? ""}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="${headers.length}" class="text-center text-slate-500 py-6">no records</td></tr>`}</tbody>
    </table></div>`;
}
const card = (title, value, sub = "") =>
  `<div class="bg-white border border-slate-200 rounded p-4">
     <div class="text-xs text-slate-500 uppercase tracking-wide">${title}</div>
     <div class="text-2xl font-semibold mt-1">${value}</div>
     ${sub ? `<div class="text-xs text-slate-500 mt-1">${sub}</div>` : ""}
   </div>`;

async function renderDashboard() {
  const root = $("#view-dashboard");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const [nodes, models, usage] = await Promise.all([
      api("/admin/v1/nodes"),
      api("/admin/v1/models"),
      api("/admin/v1/usage/recent"),
    ]);
    const tokens = (usage || []).reduce((s, u) => s + (u.PromptTokens || 0) + (u.CompletionTokens || 0), 0);
    root.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        ${card("Nodes", (nodes || []).length)}
        ${card("Models", (models || []).length)}
        ${card("Recent requests", (usage || []).length, "last 200")}
        ${card("Tokens served", tokens.toLocaleString(), "last 200 requests")}
      </div>
      <div class="bg-white border border-slate-200 rounded p-4">
        <div class="text-sm font-semibold mb-2">Quick start</div>
        <pre class="text-xs bg-slate-900 text-slate-100 p-3 rounded overflow-auto">curl ${location.origin}/v1/chat/completions \\
  -H 'Authorization: Bearer ${API_KEY}' \\
  -H 'Content-Type: application/json' \\
  -d '{"model":"auto","messages":[{"role":"user","content":"hello"}]}'</pre>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

// =========== Connect tab (M3-T23 + M3-T24) ===========
//
// Lets a user pick a tool, see the exact paste-ready config snippet
// with their token already substituted, copy it, and run a health
// check against the gateway. Backed by /admin/v1/connect/clients,
// /admin/v1/connect/snippet, and /admin/v1/healthcheck — which all
// invoke internal/control/ functions, the same code the CLI uses.

let connectClientsCache = null;

async function renderConnect() {
  const root = $("#view-connect");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    if (!connectClientsCache) {
      connectClientsCache = (await api("/admin/v1/connect/clients")) || [];
    }
    const clients = connectClientsCache;
    const options = clients.map((c, i) =>
      `<option value="${c.ID}"${i === 0 ? " selected" : ""}>${c.ID} — ${c.Description}</option>`
    ).join("");
    root.innerHTML = `
      <div class="mb-3">
        <h2 class="text-lg font-semibold">Wire up a tool</h2>
        <p class="text-xs text-slate-600">Pick a tool, copy its config snippet, paste into your shell or app settings. The token below is your current session token.</p>
      </div>

      <div class="bg-white border border-slate-200 rounded p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
          <div>
            <label class="text-xs text-slate-500">Tool</label>
            <select id="connClient" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">${options}</select>
          </div>
          <div>
            <label class="text-xs text-slate-500">Model to suggest</label>
            <input id="connModel" type="text" value="auto" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
          <div class="flex gap-2">
            <button onclick="renderConnectSnippet()" class="bg-slate-900 text-white px-4 py-1.5 rounded text-sm font-medium flex-1">Show config</button>
            <button onclick="runHealthCheck()" class="bg-emerald-600 text-white px-4 py-1.5 rounded text-sm font-medium" title="Send a tiny chat completion through the gateway with the current default model — proves wiring works end-to-end">Test connection</button>
          </div>
        </div>
        <div id="healthResult" class="hidden mt-3 text-sm"></div>
      </div>

      <div id="snippetBox" class="hidden">
        <div class="flex justify-between items-center mb-2">
          <div class="text-xs uppercase tracking-wide text-slate-500" id="snippetTitle">Snippet</div>
          <button onclick="copySnippet()" id="copySnippetBtn" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded">Copy</button>
        </div>
        <pre id="snippetPre" class="bg-slate-900 text-emerald-300 rounded p-4 text-xs overflow-x-auto whitespace-pre"></pre>
      </div>

      <div class="mt-6 text-xs text-slate-500">
        Same content as <span class="code">flock connect &lt;tool&gt;</span> on the CLI — the admin endpoint wraps the same Go function the CLI calls.
      </div>`;
    // Auto-render the first client's snippet on load.
    await renderConnectSnippet();
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderConnectSnippet() {
  const client = $("#connClient").value;
  const model = $("#connModel").value.trim() || "auto";
  const box = $("#snippetBox");
  const pre = $("#snippetPre");
  const title = $("#snippetTitle");
  try {
    const out = await api("/admin/v1/connect/snippet", {
      method: "POST",
      body: JSON.stringify({ client, model }),
    });
    title.textContent = `${out.Client.ID} — ${out.Client.Protocol} API`;
    pre.textContent = out.Snippet;
    box.classList.remove("hidden");
  } catch (e) {
    title.textContent = "Error";
    pre.textContent = e.message;
    box.classList.remove("hidden");
  }
}

async function copySnippet() {
  const text = $("#snippetPre").textContent;
  const btn = $("#copySnippetBtn");
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    btn.classList.add("bg-emerald-300");
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove("bg-emerald-300");
    }, 1500);
  } catch (e) {
    alert("Copy failed: " + e.message);
  }
}

async function runHealthCheck() {
  const box = $("#healthResult");
  box.classList.remove("hidden");
  box.innerHTML = `<span class="text-slate-500">⏱  Sending test request through the gateway…</span>`;
  try {
    const out = await api("/admin/v1/healthcheck", {
      method: "POST",
      body: JSON.stringify({}),
    });
    if (out.ok) {
      box.innerHTML = `<span class="text-emerald-700">✔ OK</span> · ${out.latency_ms} ms · model: <span class="code">${out.model}</span> · engine: <span class="code">${out.engine}</span><br><span class="text-xs text-slate-500">Reply: "${(out.reply || "").replace(/</g, "&lt;").slice(0, 200)}"</span>`;
    } else {
      box.innerHTML = `<span class="text-red-700">✘ FAILED</span> · ${out.latency_ms} ms · model: <span class="code">${out.model}</span><br><span class="text-xs text-red-600">${out.error || "unknown error"}</span>`;
    }
  } catch (e) {
    box.innerHTML = `<span class="text-red-700">✘ request failed:</span> ${e.message}`;
  }
}

// =========== Playground tab (M3-T25) ===========
//
// Simple in-browser chat. Lets non-technical users prove the gateway
// + model work in 10 seconds without setting up Cursor or Claude
// Code. Uses /v1/chat/completions with streaming.

let playgroundModels = null;

async function renderPlayground() {
  const root = $("#view-playground");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading models…</div>`;
  try {
    if (!playgroundModels) {
      const resp = await api("/v1/models");
      playgroundModels = (resp.data || []).map((m) => m.id);
    }
    const options = playgroundModels.map((id, i) =>
      `<option value="${id}"${i === 0 ? " selected" : ""}>${id}</option>`
    ).join("");
    root.innerHTML = `
      <div class="mb-3">
        <h2 class="text-lg font-semibold">Playground</h2>
        <p class="text-xs text-slate-600">Send a chat / vision / embedding request directly through the gateway — sanity-check before wiring up Cursor or Claude Code.</p>
      </div>

      <div class="bg-white border border-slate-200 rounded p-4 space-y-3">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
          <div>
            <label class="text-xs text-slate-500">Model</label>
            <select id="pgModel" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">${options || "<option>auto</option>"}</select>
          </div>
          <div>
            <label class="text-xs text-slate-500">Max tokens</label>
            <input id="pgMaxTokens" type="number" value="256" min="1" max="4096" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
          <div>
            <label class="text-xs text-slate-500">Temperature</label>
            <input id="pgTemp" type="number" value="0.7" min="0" max="2" step="0.1" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
        </div>
        <div>
          <label class="text-xs text-slate-500">System prompt (optional)</label>
          <textarea id="pgSystem" rows="2" class="w-full border border-slate-300 rounded px-2 py-1 text-sm font-mono" placeholder="You are a helpful assistant."></textarea>
        </div>
        <div>
          <label class="text-xs text-slate-500">Your message</label>
          <textarea id="pgUser" rows="4" class="w-full border border-slate-300 rounded px-2 py-1 text-sm font-mono" placeholder="What can you do?"></textarea>
        </div>
        <div>
          <label class="text-xs text-slate-500">Image (optional — sent as image_url content block)</label>
          <div class="flex gap-2 items-center">
            <input id="pgImage" type="file" accept="image/png,image/jpeg,image/webp,image/gif" onchange="pgImagePreview()" class="text-xs" />
            <button type="button" onclick="pgImageClear()" class="text-xs text-slate-500 hover:text-slate-700 hidden" id="pgImageClearBtn">clear</button>
          </div>
          <div id="pgImagePreview" class="hidden mt-2"></div>
          <p class="text-xs text-slate-500 mt-1">Vision-capable models: gemma4-12b, gemma4-26b, llama-4-scout, qwen3-vl-*, step-3.7-flash-sharded. Pick one above before attaching.</p>
        </div>
        <div class="flex gap-2">
          <button id="pgSendBtn" onclick="pgSend()" class="bg-slate-900 text-white px-4 py-2 rounded text-sm font-medium">Send chat</button>
          <button onclick="pgClear()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded text-sm">Clear</button>
        </div>
      </div>

      <div id="pgResponseBox" class="hidden mt-4">
        <div class="flex justify-between items-center mb-2">
          <div class="text-xs uppercase tracking-wide text-slate-500" id="pgResponseLabel">Response</div>
          <div id="pgStatus" class="text-xs text-slate-500"></div>
        </div>
        <pre id="pgResponsePre" class="bg-slate-50 border border-slate-200 rounded p-4 text-sm whitespace-pre-wrap"></pre>
      </div>

      <!-- ─── Embeddings ─── -->
      <div class="mt-6 bg-white border border-slate-200 rounded p-4 space-y-3">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-sm font-semibold">Embeddings</div>
            <div class="text-xs text-slate-500">POST /v1/embeddings — quick check that an embedding model returns a vector. Use the same Bearer key as chat.</div>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 items-end">
          <div>
            <label class="text-xs text-slate-500">Model</label>
            <select id="pgEmbedModel" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">${options || "<option>nomic-embed-text</option>"}</select>
          </div>
          <div>
            <label class="text-xs text-slate-500">Input</label>
            <input id="pgEmbedInput" type="text" value="the quick brown fox" class="w-full border border-slate-300 rounded px-2 py-1 text-sm font-mono" />
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="pgEmbed()" class="bg-slate-900 text-white px-4 py-2 rounded text-sm font-medium">Get embedding</button>
        </div>
        <div id="pgEmbedResult" class="hidden text-xs">
          <div id="pgEmbedStatus" class="text-slate-500 mb-1"></div>
          <pre id="pgEmbedPre" class="bg-slate-50 border border-slate-200 rounded p-3 font-mono overflow-x-auto"></pre>
        </div>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

// pgImage* helpers: read the selected file as a data: URL so we can embed
// it in an OpenAI-style content array. Kept in-memory until Send.
let pgImageDataURL = null;
function pgImagePreview() {
  const file = $("#pgImage").files[0];
  const preview = $("#pgImagePreview");
  const clearBtn = $("#pgImageClearBtn");
  if (!file) { pgImageDataURL = null; preview.classList.add("hidden"); clearBtn.classList.add("hidden"); return; }
  const r = new FileReader();
  r.onload = () => {
    pgImageDataURL = r.result;
    preview.innerHTML = `<img src="${r.result}" class="max-h-32 rounded border border-slate-200" alt="preview">
      <div class="text-xs text-slate-500 mt-1">${file.name} · ${(file.size/1024).toFixed(1)} KB</div>`;
    preview.classList.remove("hidden");
    clearBtn.classList.remove("hidden");
  };
  r.readAsDataURL(file);
}
function pgImageClear() {
  pgImageDataURL = null;
  $("#pgImage").value = "";
  $("#pgImagePreview").classList.add("hidden");
  $("#pgImageClearBtn").classList.add("hidden");
}

async function pgEmbed() {
  const model = $("#pgEmbedModel").value;
  const input = $("#pgEmbedInput").value.trim();
  if (!input) { alert("Type something to embed."); return; }
  const wrap = $("#pgEmbedResult");
  const status = $("#pgEmbedStatus");
  const pre = $("#pgEmbedPre");
  wrap.classList.remove("hidden");
  status.textContent = "embedding…";
  pre.textContent = "";
  const t0 = performance.now();
  try {
    const resp = await fetch("/v1/embeddings", {
      method: "POST",
      headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ model, input }),
    });
    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`${resp.status}: ${t}`);
    }
    const obj = await resp.json();
    const vec = obj.data?.[0]?.embedding || [];
    const ms = Math.round(performance.now() - t0);
    status.textContent = `done · ${vec.length}-dim · ${ms} ms · model=${obj.model || model}`;
    // Show the first 12 components + ellipsis to keep the UI tight.
    const preview = vec.slice(0, 12).map((x) => x.toFixed(4)).join(", ");
    pre.textContent = `[${preview}${vec.length > 12 ? `, … ${vec.length - 12} more` : ""}]`;
  } catch (e) {
    status.textContent = "error";
    pre.textContent = e.message;
  }
}

let pgController = null;

async function pgSend() {
  const model = $("#pgModel").value;
  const system = $("#pgSystem").value.trim();
  const user = $("#pgUser").value.trim();
  if (!user) { alert("Type a message first."); return; }
  const maxTokens = parseInt($("#pgMaxTokens").value, 10) || 256;
  const temp = parseFloat($("#pgTemp").value) || 0.7;

  const box = $("#pgResponseBox");
  const pre = $("#pgResponsePre");
  const status = $("#pgStatus");
  const btn = $("#pgSendBtn");
  box.classList.remove("hidden");
  pre.textContent = "";
  status.textContent = "streaming…";
  btn.disabled = true;
  btn.classList.add("opacity-50");

  const messages = [];
  if (system) messages.push({ role: "system", content: system });
  if (pgImageDataURL) {
    // OpenAI multimodal content-array shape. Flock translates this for
    // the Ollama backend; vision-capable models (gemma4-*, llama-4-scout,
    // qwen3-vl-*, step-3.7-flash) receive the image bytes.
    messages.push({
      role: "user",
      content: [
        { type: "text", text: user },
        { type: "image_url", image_url: { url: pgImageDataURL } },
      ],
    });
  } else {
    messages.push({ role: "user", content: user });
  }

  const t0 = performance.now();
  try {
    if (pgController) pgController.abort();
    pgController = new AbortController();
    const resp = await fetch("/v1/chat/completions", {
      method: "POST",
      signal: pgController.signal,
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        model,
        messages,
        max_tokens: maxTokens,
        temperature: temp,
        stream: true,
      }),
    });
    if (!resp.ok) {
      const t = await resp.text();
      throw new Error(`${resp.status}: ${t}`);
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // SSE frames: each "data: ..." line is one event.
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if (payload === "" || payload === "[DONE]") continue;
        try {
          const obj = JSON.parse(payload);
          const delta = obj.choices?.[0]?.delta?.content;
          if (delta) pre.textContent += delta;
        } catch { /* skip malformed frame */ }
      }
    }
    status.textContent = `done · ${Math.round(performance.now() - t0)} ms`;
  } catch (e) {
    if (e.name === "AbortError") {
      status.textContent = "aborted";
    } else {
      status.textContent = "error";
      pre.textContent += `\n\n[error: ${e.message}]`;
    }
  } finally {
    btn.disabled = false;
    btn.classList.remove("opacity-50");
    pgController = null;
  }
}

async function drainNode(id) {
  if (!confirm(`Mark ${id} as draining? Existing requests will finish; no new requests will route to it.`)) return;
  try {
    await api(`/admin/v1/nodes/${encodeURIComponent(id)}/drain`, { method: "POST" });
    await renderNodes();
  } catch (e) {
    alert("Drain failed: " + e.message);
  }
}

async function removeNode(id) {
  if (!confirm(`Permanently remove ${id} from the cluster? The worker will keep running but the leader will forget it.`)) return;
  try {
    await api(`/admin/v1/nodes/${encodeURIComponent(id)}`, { method: "DELETE" });
    await renderNodes();
  } catch (e) {
    alert("Remove failed: " + e.message);
  }
}

async function addNodeWizard() {
  const name = prompt("Name for the new worker's join token (used for audit only):", "worker-" + Date.now().toString(36));
  if (!name) return;
  try {
    const resp = await api("/admin/v1/tokens", {
      method: "POST",
      body: JSON.stringify({ name, scope: "node" }),
    });
    const cmd = `curl -fsSL ${location.origin}/install.sh | sh -s -- join ${location.origin}?token=${resp.plaintext}`;
    showOneTimeModal(
      "Worker join command",
      `Run this on the new machine. The token is shown once and cannot be retrieved later.`,
      cmd
    );
  } catch (e) {
    alert("Could not create join token: " + e.message);
  }
}

async function submitInvite() {
  const name = document.getElementById("invName").value.trim();
  const quota = parseInt(document.getElementById("invQuota").value, 10) || 0;
  const model = document.getElementById("invModel").value.trim() || "auto";
  const clientsRaw = document.getElementById("invClients").value.trim();
  const clients = clientsRaw ? clientsRaw.split(",").map((s) => s.trim()).filter(Boolean) : null;
  const errEl = document.getElementById("invErr");
  const btn = document.getElementById("invSubmit");
  errEl.classList.add("hidden");

  if (!name) { errEl.textContent = "Name is required."; errEl.classList.remove("hidden"); return; }

  btn.disabled = true;
  btn.classList.add("opacity-50");
  btn.textContent = "Creating…";
  try {
    const res = await api("/admin/v1/invite", {
      method: "POST",
      body: JSON.stringify({
        name,
        quota_daily_tokens: quota,
        clients,
        model,
      }),
    });
    showInviteResult(res);
    // Trigger a refresh of the tokens table behind the modal.
    if (currentView === "tokens") renderTokens();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove("hidden");
    btn.disabled = false;
    btn.classList.remove("opacity-50");
    btn.textContent = "Create user + token";
  }
}

        <div class="text-lg font-semibold">✔ Created '${res.name}'</div>

    <div class="mt-4 flex justify-end">

function copyVal(id, btn) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.value || el.textContent).then(() => {
    const orig = btn.textContent;
    btn.textContent = "Copied!";
    btn.classList.add("bg-emerald-300");
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove("bg-emerald-300");
    }, 1500);
  });
}

async function renderModels() {
  const root = $("#view-models");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const [installed, catalog] = await Promise.all([
      api("/admin/v1/models"),
      api("/admin/v1/catalog"),
    ]);
    // Build a lookup so we can join license + capabilities onto the installed row.
    const byID = {};
    (catalog || []).forEach((c) => { byID[c.id] = c; });

    const licenseBadge = (lic, url) => {
      if (!lic) return `<span class="text-xs text-slate-400">—</span>`;
      const restrictive = !/^(apache-2\.0|mit|bsd|lfm-open)$/i.test(lic);
      const color = restrictive ? "text-amber-700 bg-amber-50 border-amber-200" : "text-emerald-700 bg-emerald-50 border-emerald-200";
      const label = `<span class="text-xs font-mono border px-1.5 py-0.5 rounded ${color}" title="${url || ''}">${lic}</span>`;
      return url ? `<a href="${url}" target="_blank" rel="noopener noreferrer" class="hover:underline">${label}</a>` : label;
    };

    const installedSet = new Set((installed || []).map((m) => m.CatalogID));
    const installedRows = (installed || []).map((m) => {
      const c = byID[m.CatalogID] || {};
      return [
        `<span class="code">${m.CatalogID}</span>`,
        stateBadge(m.Status),
        licenseBadge(c.license, c.license_url),
        `<span class="code">${m.Source}</span>`,
        m.SizeBytes ? (m.SizeBytes / 1e9).toFixed(1) + " GB" : "—",
        new Date(m.InstalledAt).toLocaleString(),
        `<button class="text-xs text-red-600 hover:underline" onclick="removeModel('${m.CatalogID}')">remove</button>`,
      ];
    });
    const catalogOptions = (catalog || [])
      .filter((c) => !installedSet.has(c.id))
      .map((c) => {
        const sz = c.size_bytes ? (c.size_bytes / 1e9).toFixed(1) + " GB" : "?";
        const sharded = c.sharding && c.sharding.required ? " (sharded)" : "";
        const lic = c.license ? ` · ${c.license}` : "";
        return `<option value="${c.id}">${c.id} — ${c.display_name} · ${sz}${sharded}${lic}</option>`;
      }).join("");

    root.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-semibold">Installed models</h2>
        <p class="text-xs text-slate-500">License badge: <span class="text-emerald-700 bg-emerald-50 border border-emerald-200 px-1.5 rounded text-xs font-mono">permissive</span> · <span class="text-amber-700 bg-amber-50 border border-amber-200 px-1.5 rounded text-xs font-mono">check terms</span></p>
      </div>
      ${table(["ID", "Status", "License", "Source", "Size", "Installed", ""], installedRows)}

      <div class="bg-white border border-slate-200 rounded p-4 mt-6">
        <div class="text-sm font-semibold mb-2">Add a model from the catalog</div>
        <div class="flex gap-2 items-end flex-wrap">
          <div class="flex-1 min-w-[260px]">
            <label class="text-xs text-slate-500">Catalog entry</label>
            <select id="addModelSelect" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
              <option value="">— pick a model —</option>
              ${catalogOptions}
            </select>
          </div>
          <button id="addModelBtn" onclick="addModel()" class="bg-slate-900 text-white px-4 py-1.5 rounded text-sm font-medium">Install</button>
        </div>
        <p class="text-xs text-slate-500 mt-2">Pulls the weights via the configured engine. Sharded models delegate to the shard orchestrator automatically.</p>
        <p id="addModelMsg" class="hidden mt-2 text-sm"></p>
      </div>`;
  } catch (e) {

async function addModel() {
  const sel = $("#addModelSelect");

  const btn = $("#addModelBtn");
  const msg = $("#addModelMsg");
  btn.disabled = true;
  btn.textContent = "Installing…";

  msg.textContent = "Pulling weights — this may take a few minutes.";

    await api("/admin/v1/models", { method: "POST", body: JSON.stringify({ id }) });

async function removeModel(id) {
  if (!confirm(`Remove model ${id}? This deletes weights from the local engine (for non-sharded models) or tears down all shards (for sharded models).`)) return;

    await api(`/admin/v1/models/${encodeURIComponent(id)}`, { method: "DELETE" });

  } catch (e) {
    alert("Remove failed: " + e.message);
  }
}

async function renderShards() {
  const root = $("#view-shards");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const [shards, procs] = await Promise.all([
      api("/admin/v1/shards"),
      api("/admin/v1/shards/processes").catch(() => []),
    ]);
    const procByID = {};
    (procs || []).forEach((p) => { procByID[p.id] = p; });

    const runtimeBadge = (shard) => {
      const p = procByID[shard.ProcessID];
      if (!p) {
        // Process isn't tracked by the leader's supervisor — typically a
        // rpc-server on a worker, or a coordinator that's been placed on
        // a worker. Fall back to the shard row's static Status.
        return stateBadge(shard.Status) + ` <span class="text-xs text-slate-400">(remote)</span>`;
      }
      // Crashloop is the dangerous state — render it bright red so on-call
      // can't miss it. Failed = same shape but transient. Running = green.
      const colors = {
        running:   "bg-green-100 text-green-700",
        starting:  "bg-amber-100 text-amber-700",
        stopped:   "bg-slate-200 text-slate-700",
        failed:    "bg-red-100 text-red-700",
        crashloop: "bg-red-600 text-white font-bold",
      };
      const c = colors[p.status] || "bg-slate-100 text-slate-700";
      return `<span class="text-xs px-2 py-0.5 rounded ${c}" title="PID ${p.pid}${p.exit_err ? '\n' + p.exit_err : ''}">${p.status}</span>`;
    };

    const restartsCell = (shard) => {
      const p = procByID[shard.ProcessID];
      if (!p) return `<span class="text-xs text-slate-400">—</span>`;
      const n = p.restarts || 0;
      if (n === 0) return `<span class="text-xs text-slate-500">0</span>`;
      const color = n >= 4 ? "text-red-700 font-bold" : n >= 2 ? "text-amber-700" : "text-slate-700";
      return `<span class="text-xs ${color}" title="Auto-restart count since launch (capped at 5 → crashloop)">${n}</span>`;
    };

    // Group by model for readability
    const groups = {};
    for (const s of shards || []) {
      (groups[s.ModelID] ||= []).push(s);
    }
    const groupNames = Object.keys(groups).sort();
    const groupHTML = groupNames.length === 0
      ? `<div class="bg-white border border-slate-200 rounded p-6 text-center text-slate-500">no sharded models yet — create one below</div>`
      : groupNames.map((mid) => {
          const rows = groups[mid].map((s) => [
            roleBadge(s.Role),
            `<span class="code">${s.NodeID}</span>`,
            `<span class="code">${s.Address}</span>`,
            runtimeBadge(s),
            restartsCell(s),
            new Date(s.LastSeen).toLocaleString(),
            `<button class="text-red-600 hover:underline text-xs" onclick="removeSharded('${mid}')">remove model</button>`,
          ]);
          return `
            <div class="bg-white border border-slate-200 rounded">
              <div class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
                <div>
                  <div class="font-semibold text-slate-900">${mid}</div>
                  <div class="text-xs text-slate-500">${groups[mid].length} shard${groups[mid].length === 1 ? '' : 's'}</div>
                </div>
                <button class="text-red-600 hover:underline text-sm" onclick="removeSharded('${mid}')">Tear down</button>
              </div>
              ${table(["Role", "Node", "Address", "Runtime", "Restarts", "Last seen", ""], rows)}
            </div>`;
        }).join("");

    root.innerHTML = `
      <div class="flex justify-between items-start mb-4">
        <div>
          <h2 class="text-lg font-semibold">Sharded models</h2>
          <p class="text-xs text-slate-500 mt-1">One model split across multiple nodes via llama.cpp RPC. The coordinator runs on the leader; rpc-server runs on each shard host.</p>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded p-4 mb-4">
        <div class="text-sm font-semibold mb-2">Create new sharded model</div>
        <div class="flex gap-2 flex-wrap items-end">
          <div class="flex-1 min-w-[180px]">
            <label class="text-xs text-slate-500">Catalog model id</label>
            <input id="shardModel" type="text" placeholder="e.g. llama-3.3-70b" class="w-full border border-slate-300 rounded px-2 py-1 text-sm font-mono" />
          </div>
          <div class="w-24">
            <label class="text-xs text-slate-500">Shards</label>
            <input id="shardCount" type="number" value="2" min="2" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
          <button id="shardCreateBtn" onclick="createSharded()" class="bg-slate-900 text-white px-4 py-1.5 rounded text-sm font-medium hover:bg-slate-800">Create</button>
        </div>
        <p id="shardErr" class="hidden mt-2 text-sm text-red-600"></p>
        <p id="shardOk" class="hidden mt-2 text-sm text-green-700"></p>
      </div>

      <div class="space-y-4">${groupHTML}</div>

      <div class="mt-6 bg-amber-50 border border-amber-200 rounded p-3 text-sm text-amber-900">
        <strong>Prereqs:</strong> The leader must have <span class="code">llama-server</span> installed (from <span class="code">brew install llama.cpp</span>), each worker must have <span class="code">rpc-server</span> on PATH, and the catalog entry needs <span class="code">sharding.required: true</span> plus a local GGUF path in <span class="code">source.path</span>. Sharded GGUFs are auto-uploaded to every worker (sha256-verified).
      </div>
      <div class="mt-3 bg-slate-50 border border-slate-200 rounded p-3 text-xs text-slate-600">
        <strong>Runtime states:</strong> <span class="px-1.5 py-0.5 rounded bg-green-100 text-green-700">running</span> · <span class="px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">starting</span> · <span class="px-1.5 py-0.5 rounded bg-red-100 text-red-700">failed</span> (transient, auto-restart kicks in) · <span class="px-1.5 py-0.5 rounded bg-red-600 text-white font-bold">crashloop</span> (5 restarts exhausted — operator must intervene). Remote rpc-server processes show "(remote)" until v0.7 fans out the supervisor probe to workers.
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function createSharded() {
  const model = $("#shardModel").value.trim();
  const shards = parseInt($("#shardCount").value, 10) || 2;
  $("#shardErr").classList.add("hidden");
  $("#shardOk").classList.add("hidden");
  $("#shardCreateBtn").disabled = true;
  $("#shardCreateBtn").textContent = "Creating…";
  try {
    await api("/admin/v1/shards/create", {
      method: "POST",
      body: JSON.stringify({ model_id: model, shards }),
    });
    $("#shardOk").textContent = `Created ${model} with ${shards} shard(s)`;
    $("#shardOk").classList.remove("hidden");
    await renderShards();
  } catch (e) {
    $("#shardErr").textContent = e.message;
    $("#shardErr").classList.remove("hidden");
    $("#shardCreateBtn").disabled = false;
    $("#shardCreateBtn").textContent = "Create";
  }
}

async function removeSharded(modelID) {
  if (!confirm(`Tear down sharded model ${modelID}? This stops the coordinator and every rpc-server worker.`)) return;
  try {
    await api(`/admin/v1/shards/${encodeURIComponent(modelID)}`, { method: "DELETE" });
    await renderShards();
  } catch (e) {
    alert(`Remove failed: ${e.message}`);
  }
}

function roleBadge(r) {
  const cls = r === "coordinator" ? "pill-info" : "pill-ok";
  return `<span class="pill ${cls}">${r}</span>`;
}

async function renderTokens() {
  const root = $("#view-tokens");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const keys = (await api("/admin/v1/tokens")) || [];
    const rows = keys.map((k) => [
      `<span class="code">${k.id}</span>`,
      k.name,
      scopeBadge(k.scope),
      k.user_id || "<i class='text-slate-400'>—</i>",
      k.quota_daily_tokens > 0 ? k.quota_daily_tokens.toLocaleString() : "<i class='text-slate-400'>∞</i>",
      k.revoked ? `<span class="pill pill-err">revoked</span>` : `<span class="pill pill-ok">active</span>`,
      new Date(k.created_at).toLocaleString(),
      k.revoked ? "" : `<button class="text-xs text-red-600 hover:underline" onclick="revokeToken('${k.id}')">revoke</button>`,
    ]);
    root.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-semibold">API keys</h2>
        <button onclick="openInviteModal()" class="bg-emerald-600 text-white px-4 py-1.5 rounded text-sm font-medium">+ Invite teammate</button>
      </div>
      ${table(["ID", "Name", "Scope", "User", "Daily quota", "Status", "Created", ""], rows)}

      <div class="mt-4 bg-amber-50 border border-amber-200 rounded p-3 text-xs text-amber-900">
        <strong>Heads-up:</strong> "node" scope tokens become the shared secret a worker uses for BOTH directions of communication. They are stored plaintext on <span class="code">nodes.worker_token</span> and used by the leader to call back into the worker. Only issue them on a trusted network (LAN or Tailscale). See the <a class="underline" href="#" onclick="switchView('settings')">Settings tab</a> for the full security model.
      </div>

      <div class="bg-white border border-slate-200 rounded p-4 mt-4">
        <div class="text-sm font-semibold mb-2">Create a new key</div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 items-end">
          <div>
            <label class="text-xs text-slate-500">Name</label>
            <input id="tokName" type="text" placeholder="alice" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
          <div>
            <label class="text-xs text-slate-500">Scope</label>
            <select id="tokScope" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
              <option value="user">user — call /v1/* endpoints</option>
              <option value="admin">admin — also call /admin/v1/*</option>
              <option value="node">node — for joining a worker</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-500">Daily quota (tokens, 0=∞)</label>
            <input id="tokQuota" type="number" value="0" min="0" class="w-full border border-slate-300 rounded px-2 py-1 text-sm" />
          </div>
          <button id="tokCreateBtn" onclick="createToken()" class="bg-slate-900 text-white py-1.5 rounded text-sm font-medium">Create</button>
        </div>
        <p id="tokMsg" class="hidden mt-2 text-sm"></p>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function createToken() {
  const name = $("#tokName").value.trim();
  const scope = $("#tokScope").value;
  const quota = parseInt($("#tokQuota").value, 10) || 0;
  if (!name) { alert("Name required."); return; }
  try {
    const resp = await api("/admin/v1/tokens", {
      method: "POST",
      body: JSON.stringify({ name, scope, quota_daily_tokens: quota }),
    });
    showOneTimeModal(
      `Key created: ${resp.name} (${resp.scope})`,
      "This is the only time you'll see this key. Store it now (e.g. paste into 1Password / a secret manager).",
      resp.plaintext
    );
    $("#tokName").value = "";
    await renderTokens();
  } catch (e) {
    const m = $("#tokMsg");
    m.classList.remove("hidden");
    m.className = "mt-2 text-sm text-red-600";
    m.textContent = e.message;
  }
}

async function revokeToken(id) {
  if (!confirm(`Revoke ${id}? Existing sessions using it will start returning 401.`)) return;
  try {
    await api(`/admin/v1/tokens/${encodeURIComponent(id)}`, { method: "DELETE" });
    await renderTokens();
  } catch (e) {
    alert("Revoke failed: " + e.message);
  }
}

function scopeBadge(scope) {
  const cls = scope === "admin" ? "pill-err" : scope === "node" ? "pill-warn" : "pill-info";
  return `<span class="pill ${cls}">${scope}</span>`;
}

async function renderUsage() {
  const root = $("#view-usage");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const us = (await api("/admin/v1/usage/recent")) || [];
    const rows = us.map((u) => [
      new Date(u.TS).toLocaleString(),
      `<span class="code">${u.UserID || u.APIKeyID}</span>`,
      u.Model,
      u.Protocol,
      u.PromptTokens,
      u.CompletionTokens,
      u.LatencyMS + " ms",
      outcomeBadge(u.Outcome),
    ]);
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">Recent requests</h2>
      ${table(["Time", "User/Key", "Model", "Protocol", "In", "Out", "Latency", "Outcome"], rows)}`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderAudit() {
  const root = $("#view-audit");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const es = (await api("/admin/v1/audit/recent")) || [];
    const rows = es.map((e) => [
      new Date(e.TS).toLocaleString(),
      e.Actor,
      e.Action,
      e.Target,
    ]);
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">Audit log</h2>
      ${table(["Time", "Actor", "Action", "Target"], rows)}`;
  } catch (err) {
    root.innerHTML = `<div class="text-sm text-red-600">${err.message}</div>`;
  }
}

async function renderSettings() {
  const root = $("#view-settings");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const cfg = await api("/admin/v1/config");
    const rows = (label, obj) => {
      const inner = Object.entries(obj).map(([k, v]) => {
        const val = typeof v === "object" && v !== null
          ? `<pre class="text-xs">${JSON.stringify(v, null, 2)}</pre>`
          : `<span class="code">${v === "" ? "<i class='text-slate-400'>(unset)</i>" : v}</span>`;
        return `<div class="flex justify-between gap-4 py-1.5 border-b border-slate-100 last:border-0">
                  <span class="text-slate-600 text-sm">${k}</span><span class="text-sm">${val}</span>
                </div>`;
      }).join("");
      return `<div class="bg-white border border-slate-200 rounded p-4">
                <div class="text-sm font-semibold mb-2">${label}</div>${inner}
              </div>`;
    };

    // statusRow: a single line for the egress/observability cards. Color
    // indicates whether the feature is wired or not.
    const statusRow = (label, status) => {
      const active = !status.startsWith("disabled");
      const color = active ? "text-emerald-700" : "text-slate-500";
      const dot = active
        ? `<span class="inline-block w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>`
        : `<span class="inline-block w-2 h-2 rounded-full bg-slate-300 mr-2"></span>`;
      return `<div class="py-1.5 border-b border-slate-100 last:border-0">
                <div class="text-sm font-medium text-slate-700">${dot}${label}</div>
                <div class="text-xs ${color} pl-4">${status}</div>
              </div>`;
    };

    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-4">Settings</h2>

      <div class="space-y-4">
        ${rows("Server", { listen: cfg.listen, external_url: cfg.external_url, data_dir: cfg.data_dir, log_level: cfg.log_level })}
        ${rows("Engine", cfg.engine)}
        ${rows("Router & fallback", cfg.router)}
        ${rows("Storage", cfg.storage)}
        ${rows("Auth", cfg.auth)}

        <div class="bg-white border border-slate-200 rounded p-4">
          <div class="text-sm font-semibold mb-2">Observability</div>
          ${statusRow("OpenTelemetry / OTLP traces", (cfg.observability || {}).otlp_status || "disabled")}
          <div class="text-xs text-slate-500 mt-2">Set <span class="code">FLOCK_OTLP_ENDPOINT</span> to a collector URL (e.g. <span class="code">http://localhost:4318</span>) and Flock emits spans for every request: <span class="code">http.request → router.Chat → router.Chat.attempt → ollama.Chat</span>. Empty endpoint = no-op (zero overhead). W3C <span class="code">traceparent</span> propagation is always on.</div>
        </div>

        <div class="bg-white border border-slate-200 rounded p-4">
          <div class="text-sm font-semibold mb-2">Cloud egress (Bedrock + Vertex)</div>
          ${statusRow("AWS Bedrock (anthropic.* via SigV4)", (cfg.egress || {}).bedrock_status || "disabled")}
          ${statusRow("Google Vertex (ADC probe)", (cfg.egress || {}).vertex_status || "disabled")}
          <div class="text-xs text-slate-500 mt-2">Bedrock signing uses the standard AWS credentials chain (env, shared config, instance role). Vertex uses Application Default Credentials (<span class="code">gcloud auth application-default login</span> / service account JSON / workload identity). Body translation for non-Anthropic Bedrock families and for Vertex Gemini lands in v0.7.</div>
        </div>
      </div>

      <div class="mt-4 bg-amber-50 border border-amber-200 rounded p-3 text-sm text-amber-900">
        <div class="font-semibold mb-1">To change settings</div>
        <div>${cfg.edit_hint || "Edit ~/.flock/config.yaml and restart flock."}</div>
        <div class="mt-2">Vendor fallback keys come from env vars:</div>
        <pre class="text-xs bg-amber-100 mt-1 p-2 rounded">ANTHROPIC_API_KEY=…   # enables claude-* via /v1/messages
OPENAI_API_KEY=…      # enables gpt-* via /v1/chat/completions
FLOCK_BEDROCK_REGION=us-east-1   # enables anthropic.* via Bedrock SigV4
FLOCK_VERTEX_PROJECT=my-project  # wires Vertex ADC probe
FLOCK_OTLP_ENDPOINT=http://localhost:4318   # exports traces</pre>
      </div>

      <div class="mt-4 bg-red-50 border border-red-200 rounded p-3 text-sm text-red-900">
        <div class="font-semibold mb-1">🔒 Security model — LAN trust</div>
        <div class="space-y-2">
          <div>Flock assumes a <strong>trusted network</strong> (LAN or Tailscale). Specifically:</div>
          <ul class="list-disc list-inside space-y-1">
            <li><strong>User API keys</strong> (admin / user scope) are <em>hashed</em> (sha256) in the database — only the plaintext you see at creation time can be used.</li>
            <li><strong>Worker tokens</strong> are still stored on the leader's SQLite. Since v0.5 they no longer travel on the wire — every leader ↔ worker call is signed via HMAC-SHA256 (5-min replay window). Set <span class="code">FLOCK_REJECT_BEARER=1</span> on workers to refuse the bearer-fallback path entirely once every leader is on v0.5+.</li>
            <li><strong>Worker HTTP servers</strong> bind only to the mesh address (LAN / tailnet IP), never 0.0.0.0. Network reachability is the first line of defense.</li>
          </ul>
          <div>For hostile networks (public WiFi, untrusted VPC), still run the cluster <strong>behind Tailscale</strong> or a similar zero-trust overlay — HMAC stops in-flight token theft but doesn't replace network-layer encryption.</div>
        </div>
      </div>

      <div class="mt-4 bg-white border border-slate-200 rounded p-4 text-sm">
        <div class="font-semibold mb-2">About</div>
        <div class="space-y-1 text-slate-600">
          <div>Endpoint: <span class="code">${location.origin}</span></div>
          <div>Web UI: embedded in the Flock binary (single static page)</div>
          <div>Docs: <a class="underline" href="https://github.com/hadihonarvar/flock">github.com/hadihonarvar/flock</a></div>
        </div>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

function stateBadge(s) {
  const cls = s === "ready" ? "pill-ok" : s === "draining" ? "pill-warn" : s === "gone" ? "pill-err" : "pill-info";
  return `<span class="pill ${cls}">${s}</span>`;
}
function outcomeBadge(s) {
  const cls = s === "ok" ? "pill-ok" : s === "rate_limited" ? "pill-warn" : "pill-err";
  return `<span class="pill ${cls}">${s}</span>`;
}

(async () => {
  if (!API_KEY) { showLogin(); return; }
  try {
    await api("/admin/v1/nodes");
    showApp();
  } catch {
    showLogin("Saved key is invalid; please re-enter.");
  }
})();
</script>
</body>
</html>
