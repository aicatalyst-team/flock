<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .tab.active { background-color: rgb(30 41 59); color: white; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 0.875rem; }
    th { background: #f9fafb; font-weight: 600; }
    .pill { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .pill-ok { background: #dcfce7; color: #166534; }
    .pill-warn { background: #fef3c7; color: #92400e; }
    .pill-err { background: #fee2e2; color: #991b1b; }
    .pill-info { background: #dbeafe; color: #1e40af; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85em; background: #f3f4f6; padding: 0.1em 0.3em; border-radius: 0.25em; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app" class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-xl font-bold tracking-tight">Flock</div>
          <div class="text-xs text-slate-400">orchestrate open LLMs · your hardware</div>
        </div>
        <div id="keyStatus" class="text-xs"></div>
      </div>
      <nav class="max-w-6xl mx-auto px-6 flex gap-1 text-sm">
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="dashboard">Dashboard</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="nodes">Nodes</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="models">Models</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="tokens">Tokens</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="usage">Usage</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="audit">Audit</button>
        <button class="tab px-4 py-2 text-slate-300 hover:text-white" data-view="settings">Settings</button>
      </nav>
    </header>

    <!-- Login -->
    <div id="login" class="hidden flex-1 flex items-center justify-center p-6">
      <div class="max-w-md w-full bg-white rounded-lg border border-slate-200 p-6 shadow-sm">
        <h2 class="text-lg font-semibold mb-2">Sign in</h2>
        <p class="text-sm text-slate-600 mb-4">Paste your admin API key. You can find it in your terminal where <span class="code">flock up</span> was started.</p>
        <input id="loginKey" type="password" placeholder="sk-orc-..." class="w-full border border-slate-300 rounded px-3 py-2 text-sm font-mono" />
        <button id="loginBtn" class="mt-3 w-full bg-slate-900 text-white py-2 rounded text-sm font-medium hover:bg-slate-800">Continue</button>
        <p id="loginErr" class="hidden mt-2 text-sm text-red-600"></p>
      </div>
    </div>

    <!-- Content -->
    <main id="content" class="hidden flex-1 max-w-6xl mx-auto w-full px-6 py-6">
      <div id="view-dashboard" class="view space-y-6"></div>
      <div id="view-nodes" class="view hidden"></div>
      <div id="view-models" class="view hidden"></div>
      <div id="view-tokens" class="view hidden"></div>
      <div id="view-usage" class="view hidden"></div>
      <div id="view-audit" class="view hidden"></div>
      <div id="view-settings" class="view hidden"></div>
    </main>

    <footer class="text-center text-xs text-slate-500 py-4">
      Flock · Apache-2.0 · <a href="https://github.com/hadihonarvar/flock" class="underline">github.com/hadihonarvar/flock</a>
    </footer>
  </div>

<script>
const KEY_STORAGE = "flock.apiKey";
let API_KEY = localStorage.getItem(KEY_STORAGE) || "";
let currentView = "dashboard";

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${r.status}: ${t}`);
  }
  if (r.headers.get("content-type")?.includes("application/json")) return r.json();
  return r.text();
}

function showLogin(err) {
  $("#login").classList.remove("hidden");
  $("#content").classList.add("hidden");
  if (err) {
    $("#loginErr").textContent = err;
    $("#loginErr").classList.remove("hidden");
  }
}
function showApp() {
  $("#login").classList.add("hidden");
  $("#content").classList.remove("hidden");
  renderKeyStatus();
  switchView(currentView);
}
function renderKeyStatus() {
  const masked = API_KEY ? API_KEY.slice(0, 9) + "…" : "no key";
  $("#keyStatus").innerHTML = `<span class="text-slate-400">key:</span> <span class="font-mono">${masked}</span> <button id="signout" class="ml-2 text-slate-400 hover:text-white underline">sign out</button>`;
  $("#signout").onclick = () => {
    localStorage.removeItem(KEY_STORAGE);
    API_KEY = "";
    showLogin();
  };
}

$("#loginBtn").onclick = async () => {
  API_KEY = $("#loginKey").value.trim();
  try {
    await api("/admin/v1/nodes");
    localStorage.setItem(KEY_STORAGE, API_KEY);
    showApp();
  } catch (e) {
    showLogin(e.message);
  }
};

function switchView(v) {
  currentView = v;
  $$(".tab").forEach((t) => t.classList.toggle("active", t.dataset.view === v));
  $$(".view").forEach((d) => d.classList.add("hidden"));
  $("#view-" + v).classList.remove("hidden");
  ({
    dashboard: renderDashboard,
    nodes: renderNodes,
    models: renderModels,
    tokens: renderTokens,
    usage: renderUsage,
    audit: renderAudit,
    settings: renderSettings,
  })[v]();
}
$$(".tab").forEach((t) => (t.onclick = () => switchView(t.dataset.view)));

function table(headers, rows) {
  return `<div class="bg-white border border-slate-200 rounded overflow-hidden">
    <table>
      <thead><tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows.length ? rows.map((r) => `<tr>${r.map((c) => `<td>${c ?? ""}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="${headers.length}" class="text-center text-slate-500 py-6">no records</td></tr>`}</tbody>
    </table></div>`;
}
const card = (title, value, sub = "") =>
  `<div class="bg-white border border-slate-200 rounded p-4">
     <div class="text-xs text-slate-500 uppercase tracking-wide">${title}</div>
     <div class="text-2xl font-semibold mt-1">${value}</div>
     ${sub ? `<div class="text-xs text-slate-500 mt-1">${sub}</div>` : ""}
   </div>`;

async function renderDashboard() {
  const root = $("#view-dashboard");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const [nodes, models, usage] = await Promise.all([
      api("/admin/v1/nodes"),
      api("/admin/v1/models"),
      api("/admin/v1/usage/recent"),
    ]);
    const tokens = (usage || []).reduce((s, u) => s + (u.PromptTokens || 0) + (u.CompletionTokens || 0), 0);
    root.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        ${card("Nodes", (nodes || []).length)}
        ${card("Models", (models || []).length)}
        ${card("Recent requests", (usage || []).length, "last 200")}
        ${card("Tokens served", tokens.toLocaleString(), "last 200 requests")}
      </div>
      <div class="bg-white border border-slate-200 rounded p-4">
        <div class="text-sm font-semibold mb-2">Quick start</div>
        <pre class="text-xs bg-slate-900 text-slate-100 p-3 rounded overflow-auto">curl ${location.origin}/v1/chat/completions \\
  -H 'Authorization: Bearer ${API_KEY}' \\
  -H 'Content-Type: application/json' \\
  -d '{"model":"auto","messages":[{"role":"user","content":"hello"}]}'</pre>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderNodes() {
  const root = $("#view-nodes");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const nodes = (await api("/admin/v1/nodes")) || [];
    const rows = nodes.map((n) => [
      `<span class="code">${n.ID}</span>`,
      n.Hostname,
      `${n.OS}/${n.Arch}`,
      `${n.RAMGB} GB`,
      n.Address || "<i class='text-slate-400'>—</i>",
      stateBadge(n.State),
      new Date(n.LastHeartbeat).toLocaleString(),
    ]);
    root.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-semibold">Nodes</h2>
        <a class="text-sm underline text-slate-600" href="#" onclick="alert('Run: flock token create --node\\nThen on the new machine: flock join http://<this-host>:8080?token=<TOKEN>')">Add node →</a>
      </div>
      ${table(["ID", "Hostname", "OS/Arch", "RAM", "Address", "State", "Last heartbeat"], rows)}`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderModels() {
  const root = $("#view-models");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const ms = (await api("/admin/v1/models")) || [];
    const rows = ms.map((m) => [
      `<span class="code">${m.CatalogID}</span>`,
      stateBadge(m.Status),
      `<span class="code">${m.Source}</span>`,
      m.SizeBytes ? (m.SizeBytes / 1e9).toFixed(1) + " GB" : "—",
      new Date(m.InstalledAt).toLocaleString(),
    ]);
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">Models</h2>
      ${table(["ID", "Status", "Source", "Size", "Installed"], rows)}
      <p class="text-xs text-slate-500 mt-3">Install with <span class="code">flock model add &lt;id&gt;</span> on the leader.</p>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderTokens() {
  const root = $("#view-tokens");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const keys = []; // not exposed via API yet
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">API keys</h2>
      <div class="bg-white border border-slate-200 rounded p-4">
        <p class="text-sm text-slate-600 mb-3">For v0.2, manage keys from the CLI:</p>
        <pre class="text-xs bg-slate-900 text-slate-100 p-3 rounded overflow-auto">flock token create alice            # user key
flock token create alice --admin     # admin key
flock token create --node            # node-join token
flock token ls
flock token revoke &lt;id&gt;</pre>
      </div>`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderUsage() {
  const root = $("#view-usage");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const us = (await api("/admin/v1/usage/recent")) || [];
    const rows = us.map((u) => [
      new Date(u.TS).toLocaleString(),
      `<span class="code">${u.UserID || u.APIKeyID}</span>`,
      u.Model,
      u.Protocol,
      u.PromptTokens,
      u.CompletionTokens,
      u.LatencyMS + " ms",
      outcomeBadge(u.Outcome),
    ]);
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">Recent requests</h2>
      ${table(["Time", "User/Key", "Model", "Protocol", "In", "Out", "Latency", "Outcome"], rows)}`;
  } catch (e) {
    root.innerHTML = `<div class="text-sm text-red-600">${e.message}</div>`;
  }
}

async function renderAudit() {
  const root = $("#view-audit");
  root.innerHTML = `<div class="text-sm text-slate-500">Loading…</div>`;
  try {
    const es = (await api("/admin/v1/audit/recent")) || [];
    const rows = es.map((e) => [
      new Date(e.TS).toLocaleString(),
      e.Actor,
      e.Action,
      e.Target,
    ]);
    root.innerHTML = `
      <h2 class="text-lg font-semibold mb-3">Audit log</h2>
      ${table(["Time", "Actor", "Action", "Target"], rows)}`;
  } catch (err) {
    root.innerHTML = `<div class="text-sm text-red-600">${err.message}</div>`;
  }
}

function renderSettings() {
  const root = $("#view-settings");
  root.innerHTML = `
    <h2 class="text-lg font-semibold mb-3">Settings</h2>
    <div class="bg-white border border-slate-200 rounded p-4 space-y-3 text-sm">
      <div><span class="text-slate-500">Endpoint:</span> <span class="code">${location.origin}</span></div>
      <div><span class="text-slate-500">Web UI:</span> embedded in the Flock binary (single static)</div>
      <div><span class="text-slate-500">Config:</span> <span class="code">~/.flock/config.yaml</span></div>
      <div><span class="text-slate-500">Docs:</span> <a class="underline" href="https://github.com/hadihonarvar/flock">github.com/hadihonarvar/flock</a></div>
    </div>`;
}

function stateBadge(s) {
  const cls = s === "ready" ? "pill-ok" : s === "draining" ? "pill-warn" : s === "gone" ? "pill-err" : "pill-info";
  return `<span class="pill ${cls}">${s}</span>`;
}
function outcomeBadge(s) {
  const cls = s === "ok" ? "pill-ok" : s === "rate_limited" ? "pill-warn" : "pill-err";
  return `<span class="pill ${cls}">${s}</span>`;
}

(async () => {
  if (!API_KEY) { showLogin(); return; }
  try {
    await api("/admin/v1/nodes");
    showApp();
  } catch {
    showLogin("Saved key is invalid; please re-enter.");
  }
})();
</script>
</body>
</html>
