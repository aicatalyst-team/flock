# GLM-5.1 — Z.ai's frontier agentic / structured-code model.
# 754B total / 40B active (MoE). MIT license.
# Q4 weights are ~400 GB; unsloth's dynamic 2-bit shrinks it to ~220 GB.
# Sharding required on anything below a top-tier server.
#
# Prereqs:
#   1. Download GGUF, e.g.:
#        - https://huggingface.co/unsloth/GLM-5.1-GGUF              (recommended; dynamic 1-bit/2-bit)
#        - https://huggingface.co/bartowski/zai-org_GLM-5.1-GGUF
#        - https://huggingface.co/ubergarm/GLM-5.1-GGUF
#   2. brew install llama.cpp on every node.
#   3. At least 4 workers joined.
id: glm-5.1-sharded
display_name: Z.ai GLM-5.1 (754B MoE / 40B active, sharded, agentic coder)
source:
  type: file
  path: /var/lib/flock/models/glm-5.1-q4_k_m.gguf
size_bytes: 400000000000
quant: q4_k_m
context_window: 200000
capabilities: [chat, code, reasoning, tools]
recommended_engines: [llamacpp]
hardware:
  min_ram_gb: 416
tags: [moe, sharded, frontier, coding, agentic]
license: mit
license_url: https://huggingface.co/THUDM/GLM-5.1/blob/main/LICENSE
sharding:
  required: true
  default_shards: 4
  engine: llamacpp
  rpc_port_base: 50052
  coordinator_port: 9001
