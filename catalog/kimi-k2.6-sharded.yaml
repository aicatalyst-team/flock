# Kimi K2.6 Thinking — Moonshot's frontier coding model.
# 1T total parameters / 32B active per token (MoE). Modified MIT license.
# Frontier-tier on SWE-Bench Pro (58.33 agentic, 78.57 coding avg).
#
# At Q4 weights are ~500 GB — must be sharded across multiple nodes.
# Prereqs (same as other sharded entries):
#   1. Download GGUF (see https://huggingface.co/moonshotai/Kimi-K2.6-GGUF).
#   2. brew install llama.cpp on every node.
#   3. At least 4 workers joined.
# Then: `flock model add kimi-k2.6-sharded`
id: kimi-k2.6-sharded
display_name: Moonshot Kimi K2.6 (1T MoE, sharded, frontier coding)
source:
  type: file
  path: /var/lib/flock/models/kimi-k2.6-q4_k_m.gguf
size_bytes: 500000000000
quant: q4_k_m
context_window: 200000
capabilities: [chat, code, reasoning, tools]
recommended_engines: [llamacpp]
hardware:
  min_ram_gb: 512
tags: [moe, sharded, frontier, coding, agentic]
sharding:
  required: true
  default_shards: 4
  engine: llamacpp
  rpc_port_base: 50052
  coordinator_port: 9001
