run:
  timeout: 5m
  go: '1.22'

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment   # noisy; revisit if memory becomes a concern
      - shadow
  revive:
    rules:
      - name: var-naming
      - name: indent-error-flow
      - name: redefines-builtin-id

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unused
  max-issues-per-linter: 0
  max-same-issues: 0
