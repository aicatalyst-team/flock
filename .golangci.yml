version: "2"

run:
  timeout: 5m
  go: '1.22'

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment   # noisy; revisit if memory becomes a concern
        - shadow
    revive:
      rules:
        - name: var-naming
        - name: indent-error-flow
        - name: redefines-builtin-id
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
